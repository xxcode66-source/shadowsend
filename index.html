  <style>
    :root {
      --ink: #080910;
      --ink-2: #0d1018;
      --line: rgba(255,255,255,.11);
      --line-soft: rgba(255,255,255,.07);
      --text: #f7f6fb;
      --muted: #a8a6b6;
      --violet: #b68cff;
      --violet-2: #8e5dff;
      --mint: #8ef0d2;
      --panel: rgba(15, 17, 27, .72);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: #080910;
      overflow-x: hidden;
    }

    .page-shell {
      position: relative;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 8%, rgba(122, 78, 255, .18), transparent 26%),
        radial-gradient(circle at 80% 25%, rgba(70, 234, 191, .08), transparent 20%),
        linear-gradient(180deg, #090a10 0%, #0a0c13 54%, #08090e 100%);
      isolation: isolate;
    }

    .page-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), rgba(0,0,0,.15));
    }

    .page-shell::after {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: min(1100px, 88vw);
      height: 620px;
      transform: translateX(-50%);
      z-index: -1;
      background: radial-gradient(ellipse at center, rgba(152, 100, 255, .18), transparent 65%);
      filter: blur(40px);
      opacity: .75;
      pointer-events: none;
    }

    .nav-link {
      color: #b9b6c8;
      transition: color .25s ease;
    }

    .nav-link:hover { color: #fff; }

    .glass {
      background: linear-gradient(180deg, rgba(18, 20, 31, .86), rgba(12, 14, 22, .78));
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(18px);
    }

    .glow-ring {
      box-shadow: 0 0 0 1px rgba(182,140,255,.28), 0 0 34px rgba(142,93,255,.18);
    }

    .hero-title {
      letter-spacing: -0.065em;
      line-height: .98;
    }

    .mono { font-family: 'Space Mono', monospace; }

    .noise {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .16;
      background-image: radial-gradient(rgba(255,255,255,.16) 1px, transparent 1px);
      background-size: 4px 4px;
      mask-image: linear-gradient(to bottom, black, transparent 80%);
    }

    .protocol-orb {
      position: relative;
      width: min(320px, 100%);
      aspect-ratio: 1;
      margin: auto;
      border-radius: 999px;
      background:
        radial-gradient(circle at center, rgba(182,140,255,.22), rgba(71,42,130,.12) 37%, rgba(0,0,0,0) 64%);
    }

    .protocol-orb::before,
    .protocol-orb::after {
      content: "";
      position: absolute;
      inset: 10%;
      border: 1px solid rgba(182,140,255,.26);
      border-radius: 50%;
      animation: spin 18s linear infinite;
    }

    .protocol-orb::after {
      inset: 23%;
      border-color: rgba(142,240,210,.22);
      animation-duration: 13s;
      animation-direction: reverse;
    }

    .orbit-dot {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #c7b1ff;
      box-shadow: 0 0 18px rgba(182,140,255,.95);
    }

    .orbit-dot.one { top: 19%; left: 62%; }
    .orbit-dot.two { right: 11%; bottom: 28%; background: #8ef0d2; box-shadow: 0 0 18px rgba(142,240,210,.9); }
    .orbit-dot.three { left: 16%; bottom: 28%; }

    .core {
      position: absolute;
      inset: 37%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #d9c9ff, #8f61ff 44%, #3d236b 75%);
      box-shadow: 0 0 38px rgba(163,116,255,.72), inset -10px -10px 18px rgba(24,15,51,.55);
    }

    .node-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(182,140,255,.42), transparent);
      transform-origin: left center;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .workspace-tab {
      transition: all .25s ease;
      color: #9f9bad;
      border: 1px solid transparent;
    }

    .workspace-tab.active {
      color: white;
      background: rgba(255,255,255,.07);
      border-color: rgba(255,255,255,.09);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .form-field {
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.08);
      transition: border-color .25s ease, background .25s ease;
    }

    .form-field:focus-within {
      border-color: rgba(182,140,255,.65);
      background: rgba(255,255,255,.055);
    }

    .field-input {
      width: 100%;
      background: transparent;
      outline: none;
      border: none;
      color: #fff;
      font-size: 1rem;
    }

    .field-input::placeholder { color: #777384; }

    .action-button {
      transition: transform .25s ease, box-shadow .25s ease, opacity .25s ease;
    }

    .action-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 35px rgba(126,84,255,.28);
    }

    .feature-card {
      background: rgba(255,255,255,.03);
      border-top: 1px solid rgba(255,255,255,.1);
      transition: background .25s ease, transform .25s ease;
    }

    .feature-card:hover {
      background: rgba(255,255,255,.045);
      transform: translateY(-3px);
    }

    .panel-hidden { display: none; }

    .status-ready {
      opacity: 0;
      transform: translateY(4px);
      transition: all .25s ease;
    }

    .status-ready.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .hero-title { letter-spacing: -0.05em; }
    }
  </style>

      function activateDeposit() {
        depositTab.classList.add('active');
        sendTab.classList.remove('active');
        depositPanel.classList.remove('panel-hidden');
        sendPanel.classList.add('panel-hidden');
      }

      function activateSend() {
        sendTab.classList.add('active');
        depositTab.classList.remove('active');
        sendPanel.classList.remove('panel-hidden');
        depositPanel.classList.add('panel-hidden');
      }

      depositTab.addEventListener('click', activateDeposit);
      sendTab.addEventListener('click', activateSend);

      }

      document.getElementById('sendAction').addEventListener('click', () => flashReady('sendReady'));
